<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Flora & Craft</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>

    body{
      font-family: 'Poppins', sans-serif;
      background: #f8f1ea;
    }

    .product-card{
      transition: 0.4s;
    }

    .product-card:hover{
      transform: translateY(-10px);
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <nav
    class="bg-white shadow-md px-8 py-5
    flex justify-between items-center sticky top-0 z-50">

    <h1 class="text-3xl font-bold text-[#6d4c41]">
      🌸 Flora & Craft
    </h1>

    <button
      onclick="openCart()"
      class="bg-[#8d6e63]
      hover:bg-[#6d4c41]
      text-white px-5 py-3
      rounded-full transition relative">

      Cart

      <span
        id="cartCount"
        class="absolute -top-2 -right-2
        bg-red-500 text-white text-xs
        w-6 h-6 flex items-center
        justify-center rounded-full">

        0

      </span>

    </button>

  </nav>

  <!-- HERO -->

  <section class="text-center py-20 px-5">

    <h2
      class="text-6xl font-bold
      text-[#6d4c41] mb-6">

      Crafted With Love

    </h2>

    <p
      class="text-gray-700 text-xl
      max-w-2xl mx-auto leading-relaxed">

      Handmade bouquets and aesthetic crafts
      designed specially for gifting ❤️

    </p>

  </section>

  <!-- PRODUCTS -->

  <section
    id="productContainer"
    class="grid md:grid-cols-3 gap-10 px-8 pb-20">

  </section>

  <!-- CART MODAL -->

  <div
    id="cartModal"
    class="hidden fixed inset-0
    bg-black bg-opacity-50
    flex justify-center items-center z-50">

    <div
      class="bg-white w-[95%]
      md:w-[600px]
      rounded-[30px]
      p-8 max-h-[90vh]
      overflow-auto">

      <!-- HEADER -->

      <div
        class="flex justify-between
        items-center mb-6">

        <h2
          class="text-3xl font-bold
          text-[#6d4c41]">

          Your Cart

        </h2>

        <button
          onclick="closeCart()"
          class="text-red-500 text-2xl">

          ✕

        </button>

      </div>

      <!-- CART ITEMS -->

      <div id="cartItems"></div>

      <!-- TOTAL -->

      <div class="border-t pt-5 mt-5">

        <h3
          class="text-2xl font-bold
          text-[#6d4c41]">

          Total:
          ₹<span id="totalAmount">0</span>

        </h3>

      </div>

      <!-- USER DETAILS -->

      <div class="mt-6 space-y-4">

        <input
          id="customerName"
          type="text"
          placeholder="Your Name"
          class="w-full border
          p-4 rounded-xl"/>

        <input
          id="customerAddress"
          type="text"
          placeholder="Delivery Address"
          class="w-full border
          p-4 rounded-xl"/>

      </div>

      <!-- PAYMENT BUTTON -->

      <button
        onclick="payNow()"
        class="w-full mt-6
        bg-purple-500 hover:bg-purple-600
        text-white py-4 rounded-xl
        text-lg font-semibold transition">

        Pay With UPI 💳

      </button>

      <!-- WHATSAPP -->

      <button
        onclick="sendWhatsApp()"
        class="w-full mt-4
        bg-green-500 hover:bg-green-600
        text-white py-4 rounded-xl
        text-lg font-semibold transition">

        Send Order To WhatsApp

      </button>

    </div>

  </div>

  <!-- FLOATING WHATSAPP -->

  <a
    href="https://wa.me/919849347937"
    target="_blank"
    class="fixed bottom-6 right-6
    bg-green-500 w-16 h-16
    rounded-full flex items-center
    justify-center shadow-2xl
    text-white text-3xl">

    💬

  </a>

  <script>

    // PRODUCTS

    const products = [

      {
        id: 1,
        name: "Red Velvet Bouquet",
        price: 799,
        image: "images/img1.jpeg"
      },

      {
        id: 2,
        name: "Colorful Flower Set",
        price: 499,
        image: "images/img2.jpeg"
      },

      {
        id: 3,
        name: "Custom Bouquet",
        price: 999,
        image: "images/img3.jpeg"
      },

      {
        id: 4,
        name: "Mini Flowers",
        price: 299,
        image: "images/img4.jpeg"
      },

      {
        id: 5,
        name: "Rose Collection",
        price: 649,
        image: "images/img5.jpeg"
      },

      {
        id: 6,
        name: "Festival Bouquet",
        price: 899,
        image: "images/img6.jpeg"
      }

    ];

    // CART

    let cart = [];

    // RENDER PRODUCTS

    const container =
      document.getElementById("productContainer");

    products.forEach(product => {

      container.innerHTML += `

        <div
          class="product-card bg-white
          rounded-[30px]
          overflow-hidden shadow-lg">

          <img
            src="${product.image}"
            class="w-full h-80 object-cover"/>

          <div class="p-6">

            <h3
              class="text-2xl font-bold
              text-[#6d4c41]">

              ${product.name}

            </h3>

            <div
              class="flex justify-between
              items-center mt-5">

              <p
                class="text-2xl font-bold
                text-[#8d6e63]">

                ₹${product.price}

              </p>

              <button
                onclick="addToCart(${product.id})"
                class="bg-[#8d6e63]
                hover:bg-[#6d4c41]
                text-white px-5 py-3
                rounded-full">

                Add

              </button>

            </div>

          </div>

        </div>

      `;

    });

    // ADD TO CART

    function addToCart(id){

      const item =
        products.find(product => product.id === id);

      const existing =
        cart.find(product => product.id === id);

      if(existing){

        existing.quantity++;

      } else {

        cart.push({
          ...item,
          quantity: 1
        });

      }

      updateCart();

    }

    // UPDATE CART

    function updateCart(){

      const cartItems =
        document.getElementById("cartItems");

      cartItems.innerHTML = "";

      let total = 0;

      cart.forEach(item => {

        total += item.price * item.quantity;

        cartItems.innerHTML += `

          <div
            class="flex justify-between
            items-center border-b
            pb-5 mb-5">

            <div>

              <h4
                class="font-bold text-lg
                text-[#6d4c41]">

                ${item.name}

              </h4>

              <p class="text-gray-600">

                ₹${item.price}

              </p>

            </div>

            <!-- QUANTITY -->

            <div class="flex items-center gap-3">

              <!-- MINUS -->

              <button
                onclick="decreaseQuantity(${item.id})"
                class="bg-[#d7ccc8]
                hover:bg-[#bcaaa4]
                w-10 h-10 rounded-full
                text-xl font-bold">

                -

              </button>

              <!-- COUNT -->

              <span
                class="text-xl font-bold
                w-8 text-center">

                ${item.quantity}

              </span>

              <!-- PLUS -->

              <button
                onclick="increaseQuantity(${item.id})"
                class="bg-[#8d6e63]
                hover:bg-[#6d4c41]
                text-white w-10 h-10
                rounded-full text-xl font-bold">

                +

              </button>

            </div>

          </div>

        `;

      });

      document.getElementById("totalAmount").innerText =
        total;

      const totalItems =
        cart.reduce(
          (sum, item) => sum + item.quantity,
          0
        );

      document.getElementById("cartCount").innerText =
        totalItems;

    }

    // INCREASE

    function increaseQuantity(id){

      const item =
        cart.find(product => product.id === id);

      item.quantity++;

      updateCart();

    }

    // DECREASE

    function decreaseQuantity(id){

      const item =
        cart.find(product => product.id === id);

      item.quantity--;

      if(item.quantity <= 0){

        cart =
          cart.filter(product => product.id !== id);

      }

      updateCart();

    }

    // OPEN CART

    function openCart(){

      document
        .getElementById("cartModal")
        .classList.remove("hidden");

    }

    // CLOSE CART

    function closeCart(){

      document
        .getElementById("cartModal")
        .classList.add("hidden");

    }

    // PAY NOW

    function payNow(){

      let total = 0;

      cart.forEach(item => {

        total += item.price * item.quantity;

      });

      // YOUR UPI ID

      const upiID =
        "8074197277-3@ybl";

      // BUSINESS NAME

      const name =
        "FloraCraft";

      // UPI LINK

      const upiURL =
`upi://pay?pa=${upiID}&pn=${name}&am=${total}&cu=INR`;

      // OPEN PAYMENT APP

      window.location.href =
        upiURL;

    }

    // SEND WHATSAPP

    function sendWhatsApp(){

      const name =
        document.getElementById("customerName").value;

      const address =
        document.getElementById("customerAddress").value;

      let message =

`🌸 *New Flora & Craft Order* 🌸

👤 Name: ${name}

📍 Address:
${address}

🛍️ Products:
`;

      let total = 0;

      cart.forEach(item => {

        message +=
`
• ${item.name}
  Qty: ${item.quantity}
  Amount: ₹${item.price * item.quantity}
`;

        total += item.price * item.quantity;

      });

      message +=
`

💰 Total Amount: ₹${total}

Payment Status: Paid ✅

Thank you ❤️
`;

      // YOUR WHATSAPP NUMBER

      const phone =
        "919849347937";

      const url =
`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

      window.open(url, "_blank");

    }

  </script>

</body>
</html>
